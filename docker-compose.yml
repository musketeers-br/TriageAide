
services:
  iris:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    hostname: fhir-template
    container_name: fhir-template
    ports:
      - 32782:1972
      - 32783:52773
      - 32784:53773
    command:
      - -a
      - iris session iris -U%SYS '##class(Security.Users).UnExpireUserPasswords("*")'
      - --check-caps false
    volumes:
      - ./data:/data
      - ./fhirUI:/usr/irissys/csp/fhirUI
    networks:
      - fhir-net

  triage:
    build:
      context: ./python/triage
      dockerfile: Dockerfile
    restart: always
    container_name: triage-app
    depends_on:
      - iris
    env_file:
      - ./python/triage/.env
    ports:
      - 8000:8000
      - 8001:8001
      - 8002:8002
      - 8003:8003
      - 7860:7860
    volumes:
      - ./python/triage:/app
    networks:
      - fhir-net

networks:
  fhir-net:
    driver: bridge
